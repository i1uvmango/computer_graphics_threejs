<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>The Aviator — Select Mode</title>
		<link href='https://fonts.googleapis.com/css?family=Playfair+Display:400,700,700italic' rel='stylesheet' type='text/css'>
		<style>
			* { box-sizing: border-box; margin: 0; padding: 0; }

			body {
				font-family: 'Avenir Next', Avenir, 'Helvetica Neue', Helvetica, Arial, sans-serif;
				background: linear-gradient(#e4e0ba, #f7d9aa);
				width: 100%;
				height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
			}

			h1 {
				font-family: 'Playfair Display';
				font-size: 4.5em;
				line-height: 1;
				letter-spacing: -0.025em;
				color: #d1b790;
				text-align: center;
				margin-bottom: 0.15em;
			}

			h1 span {
				font-size: 0.2em;
				font-style: italic;
				display: block;
				margin: 0 0 -1.5em 0;
				letter-spacing: 0;
			}

			h2 {
				font-family: 'Playfair Display';
				font-size: 0.75em;
				letter-spacing: 1em;
				text-transform: uppercase;
				color: #d6483b;
				text-align: center;
				text-indent: 1em;
				margin-bottom: 3.5em;
			}

			.cards {
				display: flex;
				gap: 2em;
			}

			.card {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				width: 200px;
				height: 200px;
				border: 2px solid #d1b790;
				border-radius: 4px;
				text-decoration: none;
				background: rgba(255,255,255,0.25);
				transition: background 0.2s, border-color 0.2s, transform 0.15s;
				cursor: pointer;
			}

			.card:hover {
				background: rgba(255,255,255,0.5);
				border-color: #68c3c0;
				transform: translateY(-4px);
			}

			.card__label {
				font-family: 'Playfair Display';
				font-size: 1.25em;
				font-weight: bold;
				color: #d1b790;
				letter-spacing: 0.1em;
				text-transform: uppercase;
				margin-bottom: 0.4em;
			}

			.card__sub {
				font-size: 0.72em;
				color: #a0896c;
				letter-spacing: 0.05em;
				text-align: center;
				line-height: 1.5;
				padding: 0 1em;
			}

			.card--active .card__label {
				color: #68c3c0;
			}

			.card--active {
				border-color: #68c3c0;
			}
		</style>
	</head>
	<body>
		<h1><span>the</span>Aviator</h1>
		<h2>select mode</h2>

		<div class="cards">
			<a class="card card--active" href="index.html">
				<div class="card__label">Game</div>
				<div class="card__sub">Standard<br>Three.js transforms</div>
			</a>
			<a class="card" href="index_matrix.html">
				<div class="card__label">Matrix</div>
				<div class="card__sub">Manual matrix<br>.compose() version</div>
			</a>
		</div>
	</body>
</html>
